# Workflow name shown in GitHub Actions
name: Create Issues from DOCX Table

# Manual trigger only (Run workflow button)
on:
  workflow_dispatch:

jobs:
  create-issues:

    # Use latest Ubuntu runner
    runs-on: ubuntu-latest

    # Permissions needed:
    # read repo files
    # create/edit issues
    permissions:
      contents: read
      issues: write

    steps:

      # Step 1: Download repository files into runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install Python 3.11 environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install python-docx library
      # Used to read Microsoft Word (.docx) files
      - name: Install Python dependency
        run: |
          python -m pip install --upgrade pip
          pip install python-docx

      # Step 4: Main logic - read stories.docx and create GitHub issues
      - name: Create issues from stories.docx
        env:

          # Built-in GitHub token for issue creation
          GH_TOKEN: ${{ github.token }}

          # Current repository name
          REPO: ${{ github.repository }}

        shell: bash

        run: |

          # Exit immediately if any error occurs
          set -euo pipefail

          # Run embedded Python script
          python - <<'PY'

          # Import regex
          import re

          # Used to run GitHub CLI commands
          import subprocess

          # Used to read Word document
          from docx import Document

          # Repository name from GitHub Actions
          REPO = "${{ github.repository }}"

          # Path of uploaded stories file
          DOCX_PATH = "input/stories.docx"


          # -------------------------------
          # Function: Run GitHub CLI command
          # Example: gh issue create
          # -------------------------------
          def gh(*args):
              result = subprocess.run(
                  ["gh", *args],
                  check=True,
                  capture_output=True,
                  text=True
              )
              return result.stdout.strip()


          # -------------------------------
          # Function: Clean text
          # Remove extra spaces/newlines
          # -------------------------------
          def clean_text(text: str) -> str:
              return re.sub(r"\s+", " ", (text or "").strip())


          # -------------------------------
          # Function: Create issue title
          # Example:
          # Story:
          # As a user, I want to create account...
          #
          # Result:
          # US1 - Create account
          # -------------------------------
          def make_title(sn: str, story: str) -> str:

              text = clean_text(story)

              # Remove prefix
              text = re.sub(
                  r"^As an? .*?,\s*I want to\s*",
                  "",
                  text,
                  flags=re.I
              )

              # Remove "so that ..."
              text = re.sub(
                  r"\s+so that.*$",
                  "",
                  text,
                  flags=re.I
              )

              # Remove trailing dot
              text = text.strip().rstrip(".")

              # Limit title length
              text = text[:80].strip()

              # Fallback title if blank
              if not text:
                  text = f"Story {sn}"

              return f"US{sn} - {text[:1].upper() + text[1:]}"


          # -------------------------------
          # Function: Check if issue already exists
          # Prevent duplicate US1 / US2 etc
          # -------------------------------
          def issue_exists(sn: str) -> bool:

              result = subprocess.run(
                  [
                      "gh", "issue", "list",
                      "--repo", REPO,
                      "--state", "all",
                      "--search", f"\"US{sn} -\" in:title",
                      "--json", "title",
                      "--jq",
                      f'.[] | select(.title | startswith("US{sn} -")) | .title'
                  ],
                  capture_output=True,
                  text=True
              )

              return bool(result.stdout.strip())


          # -------------------------------
          # Open stories.docx file
          # -------------------------------
          doc = Document(DOCX_PATH)


          # Default section name
          current_section = "General"

          # Count issues created
          seen = 0


          # -------------------------------
          # Loop through every table in Word file
          # -------------------------------
          for table in doc.tables:

              rows = table.rows

              if not rows:
                  continue


              # Read first row (header row)
              header = [clean_text(c.text) for c in rows[0].cells[:3]]

              # Ensure table has 3 columns
              if len(header) < 3:
                  continue


              # Ensure correct table format:
              # SN | User Stories | Acceptance Criteria
              if header[0] != "SN" or \
                 header[1] != "User Stories" or \
                 header[2] != "Acceptance Criteria":
                  continue


              # -----------------------------------
              # Find section headings like:
              # 2.1 User Management
              # 2.2 Shopping
              # -----------------------------------
              for p in doc.paragraphs:

                  txt = clean_text(p.text)

                  if re.match(r"^\d+\.\d+\s+", txt):
                      current_section = txt


              # -----------------------------------
              # Loop each story row
              # Skip header row
              # -----------------------------------
              for row in rows[1:]:

                  cells = row.cells

                  if len(cells) < 3:
                      continue


                  # Read table columns
                  sn = clean_text(cells[0].text)
                  story = clean_text(cells[1].text)
                  ac_raw = cells[2].text.strip()


                  # Skip invalid rows
                  if not re.fullmatch(r"\d+", sn):
                      continue

                  if not story:
                      continue


                  # Create issue title
                  title = make_title(sn, story)


                  # -----------------------
                  # Split Acceptance Criteria
                  # -----------------------
                  ac_lines = []

                  for line in ac_raw.splitlines():

                      line = line.strip()

                      if line:
                          ac_lines.append(line)


                  # -----------------------
                  # Build issue body
                  # -----------------------
                  body_parts = [
                      f"**Section:** {current_section}",
                      "",
                      "**User Story**",
                      story,
                      "",
                      "**Acceptance Criteria**",
                  ]


                  if ac_lines:
                      body_parts.extend(ac_lines)

                  elif ac_raw.strip():
                      body_parts.append(ac_raw.strip())

                  else:
                      body_parts.append(
                          "No acceptance criteria provided."
                      )


                  body = "\n".join(body_parts)


                  # -----------------------
                  # Skip duplicates
                  # -----------------------
                  if issue_exists(sn):
                      print(f"Skipping existing issue: US{sn}")
                      continue


                  # -----------------------
                  # Create GitHub issue
                  # -----------------------
                  print(f"Creating issue: {title}")

                  subprocess.run(
                      [
                          "gh", "issue", "create",
                          "--repo", REPO,
                          "--title", title,
                          "--body", body
                      ],
                      check=True
                  )

                  seen += 1


          # Final summary
          print(f"Done. Created {seen} issue(s).")

          PY
