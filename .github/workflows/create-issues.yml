name: Sync Issues from DOCX

on:
  workflow_dispatch:

jobs:
  sync-issues:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-docx

      - name: Test GitHub auth and project access
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh auth status
          gh project view 1 --owner kellyn11

      - name: Run issue sync script
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OWNER: kellyn11
          REPO: testprojectboardV3
          PROJECT_OWNER: kellyn11
          PROJECT_NUMBER: 7
          DEFAULT_STATUS: Backlog
        run: |
          python scripts/create_issues.py
