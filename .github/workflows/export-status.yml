name: Export Status Report

on:
  workflow_dispatch:

jobs:
  export-status:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run export status script
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python scripts/export_status.py

      - name: Commit generated report
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/status_report.txt
          git commit -m "Update status report" || echo "No changes to commit"
          git push
